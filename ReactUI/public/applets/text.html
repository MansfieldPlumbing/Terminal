<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Text</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --font-mono: 'Consolas', 'Monaco', 'Courier New', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-mono);
            overflow: hidden;
            /* Prevent overscroll bounce on body */
            overscroll-behavior: none;
        }

        textarea {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: inherit;
            font-family: inherit;
            font-size: 16px;
            line-height: 1.6;
            padding: 24px;
            resize: none;
            outline: none;
            white-space: pre-wrap;
            overflow-y: auto;
            tab-size: 4;
            /* Prevent native pull-to-refresh / overscroll so our swipe works better */
            overscroll-behavior-y: contain;
        }

        /* Custom Scrollbar for Textarea */
        textarea::-webkit-scrollbar {
            width: 10px;
        }
        textarea::-webkit-scrollbar-track {
            background: transparent;
        }
        textarea::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
        }
        textarea::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <textarea id="editor" spellcheck="false" placeholder=""></textarea>

    <script>
        const editor = document.getElementById('editor');

        // Handle Tab key
        editor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                if (!document.execCommand('insertText', false, '    ')) {
                    const start = editor.selectionStart;
                    const end = editor.selectionEnd;
                    editor.value = editor.value.substring(0, start) + '    ' + editor.value.substring(end);
                    editor.selectionStart = editor.selectionEnd = start + 4;
                }
            }
        });

        // Initialize focus
        editor.focus();

        // Back Swipe Gesture to close applet
        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        document.addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].screenX;
            const touchEndY = e.changedTouches[0].screenY;
            
            const dx = touchEndX - touchStartX;
            const dy = Math.abs(touchEndY - touchStartY);

            // If it's a strong right swipe (like an iOS back swipe or just a general right swipe)
            // that is more horizontal than vertical
            if (dx > 70 && dy < 50 && touchStartX < 50) {
                // Swipe from left edge
                window.parent.postMessage('close-applet', '*');
            }
        }, { passive: true });
    </script>
</body>
</html>
