<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No Cap - Media Stitcher</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom scrollbar utility */
    .scrollbar-none::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-none {
      -ms-overflow-style: none; /* IE and Edge */
      scrollbar-width: none; /* Firefox */
    }
  </style>
</head>
<body class="h-screen w-full bg-[#121212] text-zinc-300 font-sans flex flex-col md:max-w-[430px] md:mx-auto md:border-x border-zinc-800 overflow-hidden relative" oncontextmenu="event.preventDefault()">

  <div id="app" class="flex flex-col h-full w-full"></div>

  <!-- Loading FFmpeg Scripts via ES Modules. -->
  <script type="module">
    import { FFmpeg } from 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.15/dist/esm/index.js';
    import { fetchFile, toBlobURL } from 'https://unpkg.com/@ffmpeg/util@0.12.2/dist/esm/index.js';
    
    window.FFmpeg = FFmpeg;
    window.fetchFile = fetchFile;
    window.toBlobURL = toBlobURL;

    // Start App Once Modules Are Bound
    window.initApp();
  </script>

  <script>
    // --- Icons ---
    function getIcon(name, classes = "") {
      const baseAttr = `xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-${name} ${classes}"`;
      const icons = {
        Upload: `<svg ${baseAttr}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`,
        Scissors: `<svg ${baseAttr}><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>`,
        Download: `<svg ${baseAttr}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
        Play: `<svg ${baseAttr}><polygon points="6 3 20 12 6 21 6 3"/></svg>`,
        Pause: `<svg ${baseAttr}><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`,
        X: `<svg ${baseAttr}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
        Video: `<svg ${baseAttr}><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>`,
        Music: `<svg ${baseAttr}><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`,
        Loader2: `<svg ${baseAttr}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>`,
        ImageIcon: `<svg ${baseAttr}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`,
        Flame: `<svg ${baseAttr}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>`,
        Layers: `<svg ${baseAttr}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 12 12 17 22 12"/><polyline points="2 17 12 22 22 17"/></svg>`,
        ChevronLeft: `<svg ${baseAttr}><polyline points="15 18 9 12 15 6"/></svg>`,
        Undo2: `<svg ${baseAttr}><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11"/></svg>`,
        Redo2: `<svg ${baseAttr}><path d="m15 14 5-5-5-5"/><path d="M20 9H9.5A5.5 5.5 0 0 0 4 14.5v0A5.5 5.5 0 0 0 9.5 20H13"/></svg>`,
        Type: `<svg ${baseAttr}><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>`,
        Sparkles: `<svg ${baseAttr}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>`,
        Filter: `<svg ${baseAttr}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>`,
        Activity: `<svg ${baseAttr}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`,
        Settings2: `<svg ${baseAttr}><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg>`
      };
      return icons[name] || "";
    }

    // --- State and Constants ---
    const VIDEO_FILTERS =[
      { name: 'None', vf: '' },
      { name: 'Grayscale', vf: 'colorchannelmixer=.3:.4:.3:0:.3:.4:.3:0:.3:.4:.3' },
      { name: 'Sepia', vf: 'colorchannelmixer=.393:.769:.189:0:.349:.686:.168:0:.272:.534:.131' },
      { name: 'Contrast', vf: 'eq=contrast=1.5:brightness=-0.05' },
      { name: 'Blur', vf: 'boxblur=5:1' },
      { name: 'Vignette', vf: 'vignette' },
      { name: 'Edge Detect', vf: 'edgedetect' }
    ];

    const AUDIO_EFFECTS =[
      { name: 'None', af: '' },
      { name: 'Bass Boost', af: 'bass=g=15:f=110:w=0.6' },
      { name: 'Echo', af: 'aecho=0.8:0.9:1000:0.3' },
      { name: 'Reverb', af: 'aecho=0.8:0.8:250:0.5' },
      { name: 'Chipmunk', af: 'asetrate=44100*1.5,aresample=44100' },
      { name: 'Deep', af: 'asetrate=44100*0.75,aresample=44100' },
    ];

    const state = {
      tracks:[],
      activeTrackId: null,
      isProcessing: false,
      resultUrl: null,
      outputFormat: 'mp4',
      selectedVideoFilter: VIDEO_FILTERS[0],
      selectedAudioEffect: AUDIO_EFFECTS[0],
      activeEffectTab: 'video',
      isPlaying: false,
      currentTime: 0,
      showTools: false,
      ffmpegLoaded: false,
      previewHeight: 40
    };

    let mediaRefs = new Map();
    let draggingTrack = null;
    let scrubbing = null;
    let isDraggingPreviewHeight = false;
    let lastTime = performance.now();

    // --- Initialization ---
    window.initApp = () => {
      document.getElementById('app').innerHTML = `
        <header class="h-14 px-4 flex items-center justify-between shrink-0" id="headerContainer"></header>
        <div id="previewArea" style="height: ${state.previewHeight}vh" class="shrink-0 bg-black flex flex-col relative overflow-hidden"></div>
        <div onmousedown="handleDragStart(event)" ontouchstart="handleDragStart(event)" class="h-3 bg-[#121212] flex items-center justify-center cursor-row-resize shrink-0 z-10">
          <div class="w-8 h-1 bg-zinc-700 rounded-full pointer-events-none"></div>
        </div>
        <div class="flex items-center justify-between px-4 h-12 shrink-0 bg-[#121212]" id="toolbarContainer"></div>
        <div class="flex-1 overflow-auto custom-scrollbar relative flex flex-col bg-[#121212]" id="timelineContainer"></div>
        <div id="toolsOverlayContainer"></div>
        <input id="fileInput" type="file" multiple accept="audio/*,video/*" class="hidden" onchange="handleFileSelect(event)" />
        <div class="h-16 shrink-0 bg-[#121212] border-t border-zinc-900 flex items-center justify-around px-2 z-50 relative shadow-[0_-10px_20px_rgba(0,0,0,0.5)]" id="bottomNavContainer"></div>
        <div id="exportOverlayContainer"></div>
      `;

      updateHeader();
      updateToolbar();
      updateTimelineShell();
      updateBottomNav();
      updateToolsOverlay();
      syncMediaDOM();
      
      loadFfmpeg();
      requestAnimationFrame(gameLoop);
    };

    // --- Format Time ---
    function formatTime(time) {
      const mins = Math.floor(time / 60);
      const secs = Math.floor(time % 60);
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function getTotalLength() {
      return Math.max(1, ...state.tracks.map(t => (t.offset || 0) + (t.end - t.start)));
    }

    // --- Updates ---
    function updateHeader() {
      const container = document.getElementById('headerContainer');
      if (!container) return;
      container.innerHTML = `
        <div class="flex items-center gap-4">
          <button class="text-zinc-100 hover:text-white">${getIcon('X', 'w-5 h-5')}</button>
          <div class="bg-zinc-800 p-1.5 rounded-md">${getIcon('Layers', 'w-4 h-4 text-zinc-300')}</div>
          ${getIcon('Flame', 'w-4 h-4 text-red-500')}
        </div>
        <div class="flex items-center gap-3">
          <button onclick="saveProject()" class="text-[10px] uppercase font-bold text-zinc-400 hover:text-white px-2 py-1 border border-zinc-700 bg-zinc-800 rounded">Save</button>
          <button onclick="loadProject()" class="text-[10px] uppercase font-bold text-zinc-400 hover:text-white px-2 py-1 border border-zinc-700 bg-zinc-800 rounded">Load</button>
          <div class="w-px h-4 bg-zinc-800 mx-1"></div>
          <div class="bg-zinc-800 text-zinc-100 text-[10px] font-bold px-2 py-1 rounded flex items-center gap-1 cursor-pointer">
            1080P ${getIcon('ChevronLeft', 'w-3 h-3 -rotate-90')}
          </div>
          <button onclick="processMedia()" ${state.tracks.length === 0 || state.isProcessing || !state.ffmpegLoaded ? 'disabled' : ''} class="text-zinc-100 disabled:opacity-50">
            ${state.isProcessing ? getIcon('Loader2', 'w-5 h-5 animate-spin') : getIcon('Download', 'w-5 h-5')}
          </button>
        </div>
      `;
    }

    function updateToolbar() {
      const container = document.getElementById('toolbarContainer');
      if (!container) return;
      const activeTrack = state.tracks.find(t => t.id === state.activeTrackId);
      container.innerHTML = `
        <div class="text-[10px] font-mono text-zinc-400" id="toolbarTime">
          ${formatTime(state.currentTime)} / ${formatTime(activeTrack ? activeTrack.end : getTotalLength())}
        </div>
        <div class="flex items-center gap-6 text-zinc-300">
          <button class="hover:text-white">${getIcon('Undo2', 'w-5 h-5')}</button>
          <button onclick="togglePlay()" class="hover:text-white text-white">
            ${state.isPlaying ? getIcon('Pause', 'w-6 h-6') : getIcon('Play', 'w-6 h-6 fill-white')}
          </button>
          <button class="hover:text-white">${getIcon('Redo2', 'w-5 h-5')}</button>
        </div>
        <button class="text-zinc-300 hover:text-white" onclick="toggleTools()">
          ${getIcon('Scissors', 'w-5 h-5')}
        </button>
      `;
    }

    function updateTimelineShell() {
      const container = document.getElementById('timelineContainer');
      if (!container) return;
      container.innerHTML = `
        <div class="sticky top-0 z-40 bg-zinc-900 border-b border-zinc-800 flex h-6 w-max min-w-full shrink-0">
          <div class="w-16 shrink-0 sticky left-0 bg-zinc-900 border-r border-zinc-800 z-50 text-[8px] flex items-center justify-center text-zinc-500 uppercase tracking-widest">Tracks</div>
          <div class="flex-1 relative min-w-[2000px] cursor-text" onpointerdown="handleRulerPointerDown(event)">
              <div class="absolute inset-0 opacity-50 pointer-events-none" style="background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMjQiPjxyZWN0IHdpZHRoPSIxIiBoZWlnaHQ9IjYiIHg9IjAiIHk9IjE4IiBmaWxsPSIjNTI1MjViIi8+PHJlY3Qgd2lkdGg9IjEiIGhlaWdodD0iNCIgeD0iMTAiIHk9IjIwIiBmaWxsPSIjNTI1MjViIi8+PHJlY3Qgd2lkdGg9IjEiIGhlaWdodD0iNCIgeD0iMjAiIHk9IjIwIiBmaWxsPSIjNTI1MjViIi8+PHJlY3Qgd2lkdGg9IjEiIGhlaWdodD0iMzAiIHk9IjIwIiBmaWxsPSIjNTI1MjViIi8+PHJlY3Qgd2lkdGg9IjEiIGhlaWdodD0iNDAiIHk9IjIwIiBmaWxsPSIjNTI1MjViIi8+PHJlY3Qgd2lkdGg9IjEiIGhlaWdodD0iOCIgeD0iNTAiIHk9IjE2IiBmaWxsPSIjNTI1MjViIi8+PHJlY3Qgd2lkdGg9IjEiIGhlaWdodD0iNCIgeD0iNjAiIHk9IjIwIiBmaWxsPSIjNTI1MjViIi8+PHJlY3Qgd2lkdGg9IjEiIGhlaWdodD0iNCIgeD0iNzAiIHk9IjIwIiBmaWxsPSIjNTI1MjViIi8+PHJlY3Qgd2lkdGg9IjEiIGhlaWdodD0iNCIgeD0iODAiIHk9IjIwIiBmaWxsPSIjNTI1MjViIi8+PHJlY3Qgd2lkdGg9IjEiIGhlaWdodD0iNCIgeD0iOTAiIHk9IjIwIiBmaWxsPSIjNTI1MjViIi8+PC9zdmc+')"></div>
          </div>
        </div>
        <div class="relative w-max min-w-full flex flex-col pb-32 flex-1">
          <div id="playhead" class="absolute top-0 bottom-0 z-50 cursor-ew-resize group flex justify-center w-4 -ml-2" style="left: ${64 + Math.max(0, state.currentTime * 20)}px" onpointerdown="handlePlayheadDown(event)">
              <div class="w-0.5 h-full bg-white shadow-[0_0_4px_rgba(255,255,255,0.5)] transition-all group-hover:w-1 group-active:w-1 group-active:bg-emerald-400 group-active:shadow-[0_0_8px_rgba(52,211,153,0.8)] rounded-full"></div>
              <div class="absolute top-0 w-4 h-4 mt-0.5 text-white filter drop-shadow-md outline-none transition-colors group-active:text-emerald-400 pointer-events-none">
                <svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 1h12v7l-6 6-6-6V1z"/></svg>
              </div>
          </div>
          <div id="tracksContainer"></div>
          <div class="flex h-20 shrink-0 border-b border-zinc-800/50 relative">
               <div class="w-16 shrink-0 sticky left-0 bg-[#0f0f0f] border-r border-zinc-800 z-30 flex items-center justify-center">
                  ${getIcon('Upload', 'w-4 h-4 text-zinc-600')}
               </div>
               <div class="flex-1 flex items-center pl-4 opacity-10 min-w-[2000px] w-full" style="background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36zwjjgzhhYWGMYAEYB8RmROaABADeOQ8CXl/xfgAAAABJRU5ErkJggg==')">
                  <button onclick="document.getElementById('fileInput').click()" class="text-[10px] text-zinc-400 hover:text-white font-bold uppercase tracking-widest flex items-center gap-2 bg-zinc-900 border border-zinc-700 px-4 py-2 rounded shadow-md pointer-events-auto transition-colors z-20 absolute left-20">
                    Add File
                  </button>
               </div>
          </div>
        </div>
      `;
      renderTracks();
    }

    function renderTracks() {
      const container = document.getElementById('tracksContainer');
      if (!container) return;
      
      container.innerHTML = state.tracks.map(t => `
        <div class="flex h-20 shrink-0 border-b border-zinc-800/50">
          <div class="w-16 shrink-0 sticky left-0 bg-[#0f0f0f] border-r border-zinc-800 z-30 flex flex-col items-center justify-center gap-1.5 p-1 relative">
            <div class="text-[9px] font-bold text-zinc-500 uppercase flex flex-col items-center gap-1">
              ${t.type === 'video' ? getIcon('Video', 'w-3 h-3 text-zinc-400') : getIcon('Music', 'w-3 h-3 text-zinc-400')}
            </div>
            <button onclick="toggleMute('${t.id}', event)" class="mt-1 hover:scale-110 transition-transform">
              <div class="w-3 h-3 rounded-full flex-shrink-0 shadow-sm ${t.muted ? 'bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.5)]' : 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]'}"></div>
            </button>
          </div>
          
          <div class="flex-1 relative py-2 min-w-[2000px] w-full">
            <div onpointerdown="handleTrackPointerDown(event, '${t.id}', 'body')"
                 class="absolute h-16 bg-zinc-800 rounded-md border ${state.activeTrackId === t.id ? 'border-white z-20 shadow-[0_0_8px_rgba(255,255,255,0.2)]' : 'border-zinc-700 z-10'} overflow-hidden cursor-grab active:cursor-grabbing shadow-md"
                 style="left: ${(t.offset || 0) * 20}px; width: ${Math.max(40, (t.end - t.start) * 20)}px">
              
              <div class="absolute top-1 left-2 text-[8px] bg-black/60 px-1 rounded text-white z-20 pointer-events-none flex items-center gap-1 shadow-sm">
                ${t.type === 'video' ? 'Video' : 'Audio'} • ${t.file.name}
              </div>

              ${t.type === 'video' ? \`
                <div class="w-full h-full absolute inset-0 opacity-70 pointer-events-none"
                     style="background-image: url('\${t.thumbnail || 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36zwjjgzhhYWGMYAEYB8RmROaABADeOQ8CXl/xfgAAAABJRU5ErkJggg=='}'); background-size: auto 100%; background-repeat: repeat-x; background-position: -\${t.start*20}px 0"></div>
              \` : \`
                <div class="w-full h-full absolute flex items-center gap-[1px] opacity-70 px-1 overflow-hidden pointer-events-none" 
                     style="left: -\${t.start * 20}px; width: \${t.duration * 20}px">
                    \${Array.from({ length: Math.max(1, Math.ceil(t.duration * 20 / 3)) }).map((_, i) => \`
                      <div class="flex-1 bg-emerald-500 rounded-sm" style="height: \${20 + Math.abs(Math.sin(i * 0.4) * Math.cos(i * 2.1) * 80)}%; opacity: 0.8"></div>
                    \`).join('')}
                </div>
              \`}

              ${state.activeTrackId === t.id ? `
                <div onpointerdown="handleTrackPointerDown(event, '${t.id}', 'left')" class="absolute top-0 bottom-0 left-0 w-4 bg-white/20 hover:bg-white/40 z-30 cursor-ew-resize flex items-center justify-center border-r border-white/20">
                  <div class="w-0.5 h-4 bg-white rounded pointer-events-none"></div>
                </div>
                <div onpointerdown="handleTrackPointerDown(event, '${t.id}', 'right')" class="absolute top-0 bottom-0 right-0 w-4 bg-white/20 hover:bg-white/40 z-30 cursor-ew-resize flex items-center justify-center border-l border-white/20">
                  <div class="w-0.5 h-4 bg-white rounded pointer-events-none"></div>
                </div>
              ` : ''}
            </div>
          </div>
        </div>
      `).join('');
    }

    function syncMediaDOM() {
      const container = document.getElementById('previewArea');
      
      if (state.tracks.length === 0) {
        container.innerHTML = `
          <div class="w-full h-full flex flex-col items-center justify-center text-zinc-700 bg-[#0a0a0a]">
            ${getIcon('ImageIcon', 'w-12 h-12 mb-2 opacity-50')}
            <span class="text-xs uppercase tracking-widest font-bold">No Media</span>
          </div>
        `;
        return;
      }

      let videoContainer = document.getElementById('videoContainer');
      if (!videoContainer) {
        container.innerHTML = `
          <div class="relative w-full h-full flex items-center justify-center group overflow-hidden" id="videoContainer">
            <div class="absolute top-4 left-0 right-0 flex justify-center pointer-events-none opacity-50 z-50">
              <span class="bg-black/50 text-white text-[10px] font-mono px-2 py-0.5 rounded backdrop-blur">
                No Cap • <span id="timecodeDisplay">${formatTime(state.currentTime)}</span>
              </span>
            </div>
          </div>
        `;
        videoContainer = document.getElementById('videoContainer');
      } else {
        const tcDisplay = document.getElementById('timecodeDisplay');
        if (tcDisplay) tcDisplay.innerText = formatTime(state.currentTime);
      }

      state.tracks.forEach((t, idx) => {
        let el = mediaRefs.get(t.id);
        if (!el) {
          el = document.createElement(t.type === 'video' ? 'video' : 'audio');
          el.src = t.objectUrl;
          el.preload = 'metadata';
          if (t.type === 'video') {
            el.className = "absolute w-full h-full object-contain pointer-events-none transition-opacity duration-100";
            el.playsInline = true;
            videoContainer.appendChild(el);
          } else {
            el.className = "hidden";
            videoContainer.appendChild(el);
          }
          mediaRefs.set(t.id, el);
        }

        const isActive = state.currentTime >= (t.offset || 0) && state.currentTime < (t.offset || 0) + (t.end - t.start);
        
        if (t.type === 'video') {
          el.style.opacity = isActive ? 1 : 0;
          el.style.zIndex = idx;
          let filter = 'none';
          if (state.selectedVideoFilter.name === 'Grayscale') filter = 'grayscale(1)';
          else if (state.selectedVideoFilter.name === 'Sepia') filter = 'sepia(1)';
          else if (state.selectedVideoFilter.name === 'Blur') filter = 'blur(4px)';
          else if (state.selectedVideoFilter.name === 'Contrast') filter = 'contrast(1.5)';
          el.style.filter = filter;
        }
        
        const tStart = t.offset || 0;
        const targetTime = t.start + (state.currentTime - tStart);
        
        if (isActive) {
          if (Math.abs(el.currentTime - targetTime) > 0.3) el.currentTime = targetTime;
          if (state.isPlaying && el.paused) el.play().catch(()=>{});
          if (!state.isPlaying && !el.paused) el.pause();
        } else {
          if (!el.paused) el.pause();
        }
        el.muted = t.muted || t.type === 'video';
      });

      for (let[id, el] of mediaRefs.entries()) {
        if (!state.tracks.find(t => t.id === id)) {
          el.remove();
          mediaRefs.delete(id);
        }
      }
    }

    function updatePlayhead() {
      const playhead = document.getElementById('playhead');
      if (playhead) playhead.style.left = `${64 + Math.max(0, state.currentTime * 20)}px`;
      
      const tcDisplay = document.getElementById('timecodeDisplay');
      if (tcDisplay) tcDisplay.innerText = formatTime(state.currentTime);

      const tt = document.getElementById('toolbarTime');
      if (tt) {
        const activeTrack = state.tracks.find(t => t.id === state.activeTrackId);
        tt.innerText = `${formatTime(state.currentTime)} / ${formatTime(activeTrack ? activeTrack.end : getTotalLength())}`;
      }
      syncMediaDOM();
    }

    function updateToolsOverlay() {
      const container = document.getElementById('toolsOverlayContainer');
      if (!container) return;
      if (!state.showTools) {
        container.innerHTML = '';
        return;
      }
      
      const effects = state.activeEffectTab === 'video' ? VIDEO_FILTERS : AUDIO_EFFECTS;
      const selectedName = state.activeEffectTab === 'video' ? state.selectedVideoFilter.name : state.selectedAudioEffect.name;
      
      container.innerHTML = `
          <div class="absolute bottom-16 left-0 right-0 bg-[#121212] border-t border-zinc-800 p-4 z-40" id="toolsPanel">
            <div class="flex items-center justify-between mb-4">
               <div class="flex bg-zinc-900 rounded p-1 border border-zinc-800">
                  <button onclick="setEffectTab('video')" class="text-[10px] px-3 py-1 rounded font-bold uppercase ${state.activeEffectTab === 'video' ? 'bg-zinc-700 text-white' : 'text-zinc-500'}">Video FX</button>
                  <button onclick="setEffectTab('audio')" class="text-[10px] px-3 py-1 rounded font-bold uppercase ${state.activeEffectTab === 'audio' ? 'bg-zinc-700 text-white' : 'text-zinc-500'}">Audio FX</button>
               </div>
               <button onclick="toggleTools()">${getIcon('X', 'w-4 h-4 text-zinc-500 hover:text-white')}</button>
            </div>
            <div class="flex gap-3 overflow-x-auto pb-2 scrollbar-none">
              ${effects.map(f => `
                <button onclick="selectEffect('${f.name}')" class="flex flex-col items-center justify-center gap-2 min-w-[70px] aspect-square rounded-lg border flex-shrink-0 transition-colors ${selectedName === f.name ? 'border-white bg-white text-black' : 'border-zinc-800 bg-zinc-900 border-dashed hover:border-zinc-600'}">
                  ${getIcon(state.activeEffectTab === 'video' ? 'Filter' : 'Activity', `w-5 h-5 ${selectedName === f.name ? 'text-black' : 'text-zinc-500'}`)}
                  <span class="text-[10px] font-bold ${selectedName === f.name ? '' : 'text-zinc-400'}">${f.name}</span>
                </button>
              `).join('')}
            </div>
          </div>
      `;
    }

    function updateBottomNav() {
      const container = document.getElementById('bottomNavContainer');
      if (!container) return;
      container.innerHTML = `
         <button onclick="document.getElementById('fileInput').click()" class="flex flex-col items-center gap-1.5 p-2 text-zinc-400 hover:text-white transition-colors">
            ${getIcon('Upload', 'w-5 h-5')}
            <span class="text-[9px]">Add Media</span>
         </button>
         <button onclick="toggleTools()" class="flex flex-col items-center gap-1.5 p-2 text-zinc-400 hover:text-white transition-colors">
            ${getIcon('Sparkles', 'w-5 h-5')}
            <span class="text-[9px]">Effects</span>
         </button>
         <button class="flex flex-col items-center gap-1.5 p-2 text-zinc-400 hover:text-white transition-colors">
            ${getIcon('Type', 'w-5 h-5')}
            <span class="text-[9px]">Text</span>
         </button>
         <button class="flex flex-col items-center gap-1.5 p-2 text-zinc-400 hover:text-white transition-colors">
            ${getIcon('Settings2', 'w-5 h-5')}
            <span class="text-[9px]">Format</span>
         </button>
      `;
    }

    function updateExportOverlay() {
      const container = document.getElementById('exportOverlayContainer');
      if (!container) return;
      if (!state.resultUrl) {
        container.innerHTML = '';
        return;
      }
      container.innerHTML = `
          <div class="absolute top-1/2 left-4 right-4 -translate-y-1/2 bg-zinc-900 border border-zinc-700 p-6 rounded-xl shadow-2xl z-50 flex flex-col items-center gap-4 text-center">
            <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center">
              ${getIcon('Download', 'w-6 h-6 text-black')}
            </div>
            <div>
              <p class="text-sm font-bold text-white uppercase tracking-widest mb-1">Export Ready</p>
              <p class="text-xs text-zinc-500">Your ${state.outputFormat} file is ready.</p>
            </div>
            <a href="${state.resultUrl}" download="NoCap_Export.${state.outputFormat}" class="w-full py-3 bg-white text-black font-bold text-sm rounded-lg hover:bg-zinc-200 block text-center mt-2">
              Download to Device
            </a>
            <button onclick="closeExport()" class="mt-2 text-xs text-zinc-500 hover:text-zinc-300 uppercase font-bold tracking-widest">
              Close
            </button>
          </div>
      `;
    }

    // --- User Actions ---
    window.togglePlay = () => {
      state.isPlaying = !state.isPlaying;
      if (state.isPlaying) lastTime = performance.now();
      updateToolbar();
    };

    window.toggleMute = (trackId, e) => {
      e.stopPropagation();
      const t = state.tracks.find(t => t.id === trackId);
      if (t) {
        t.muted = !t.muted;
        renderTracks();
        syncMediaDOM();
      }
    };

    window.toggleTools = () => {
      state.showTools = !state.showTools;
      updateToolsOverlay();
    };

    window.setEffectTab = (tab) => {
      state.activeEffectTab = tab;
      updateToolsOverlay();
    };

    window.selectEffect = (name) => {
      if (state.activeEffectTab === 'video') state.selectedVideoFilter = VIDEO_FILTERS.find(f => f.name === name);
      else state.selectedAudioEffect = AUDIO_EFFECTS.find(f => f.name === name);
      updateToolsOverlay();
      syncMediaDOM();
    };

    window.closeExport = () => {
      state.resultUrl = null;
      updateExportOverlay();
    };

    window.saveProject = () => {
      const req = indexedDB.open("NoCapDB", 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore("projects");
      req.onsuccess = e => {
        const db = e.target.result;
        const tx = db.transaction("projects", "readwrite");
        tx.objectStore("projects").put(state.tracks, "autosave");
        tx.oncomplete = () => alert("Project saved to browser storage!");
      };
    };

    window.loadProject = () => {
      const req = indexedDB.open("NoCapDB", 1);
      req.onsuccess = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains("projects")) return;
        const tx = db.transaction("projects", "readonly");
        const getReq = tx.objectStore("projects").get("autosave");
        getReq.onsuccess = () => {
          if (getReq.result) {
             state.tracks = getReq.result.map(t => ({
                ...t,
                objectUrl: URL.createObjectURL(t.file) 
             }));
             renderTracks();
             syncMediaDOM();
             updateToolbar();
             updateHeader();
          }
        };
      };
    };

    window.handleFileSelect = async (e) => {
      const files = Array.from(e.target.files);
      if (!files.length) return;

      for (const file of files) {
        const isVideo = file.type.startsWith('video/');
        const objectUrl = URL.createObjectURL(file);
        
        const mediaEl = document.createElement(isVideo ? 'video' : 'audio');
        mediaEl.src = objectUrl;
        mediaEl.preload = 'metadata';
        
        const duration = await new Promise((resolve) => {
          if (mediaEl.readyState >= 1) resolve(mediaEl.duration);
          else {
            mediaEl.onloadedmetadata = () => resolve(mediaEl.duration);
            mediaEl.onerror = () => resolve(10);
          }
        });

        let thumbnail = '';
        if (isVideo) {
          try {
            mediaEl.currentTime = Math.min(1, duration / 2);
            await Promise.race([
              new Promise(r => { mediaEl.onseeked = r; mediaEl.onerror = r; }),
              new Promise(r => setTimeout(r, 1500))
            ]);
            const canvas = document.createElement('canvas');
            canvas.width = Math.floor(160 * (mediaEl.videoWidth / (mediaEl.videoHeight || 1.77)));
            canvas.height = 90;
            const ctx = canvas.getContext('2d');
            if (ctx) {
              ctx.drawImage(mediaEl, 0, 0, canvas.width, canvas.height);
              thumbnail = canvas.toDataURL('image/jpeg', 0.5);
            }
          } catch(err) {}
        }

        const newTrack = {
          id: Math.random().toString(36).substr(2, 9),
          file, type: isVideo ? 'video' : 'audio',
          start: 0, end: duration, duration, objectUrl, offset: 0, thumbnail, muted: false
        };

        state.tracks.push(newTrack);
        if (isVideo) {
          state.tracks.push({
            id: Math.random().toString(36).substr(2, 9),
            file, type: 'audio', start: 0, end: duration, duration, objectUrl, offset: 0, muted: false
          });
        }
        state.activeTrackId = newTrack.id;
      }
      
      e.target.value = '';
      renderTracks();
      syncMediaDOM();
      updateToolbar();
      updateHeader();
    };

    // --- FFmpeg Engine & Exporting ---
    window.loadFfmpeg = async () => {
      try {
        const baseURL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd';
        window.ffmpeg = new window.FFmpeg();
        await window.ffmpeg.load({
          coreURL: await window.toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
          wasmURL: await window.toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
        });
        state.ffmpegLoaded = true;
        updateHeader();
      } catch (error) {
        console.error("FFmpeg Load Error:", error);
      }
    };

    window.processMedia = async () => {
      if (state.tracks.length === 0 || state.isProcessing || !state.ffmpegLoaded) return;
      state.isProcessing = true;
      state.resultUrl = null;
      updateHeader();
      
      const ffmpeg = window.ffmpeg;
      try {
        const vStreams = [];
        const aStreams = [];
        const args =[];
        const maxEnd = Math.max(1, ...state.tracks.map(t => (t.offset || 0) + (t.end - t.start)));

        for (let i = 0; i < state.tracks.length; i++) {
          const t = state.tracks[i];
          const fileName = `input_${i}.${t.file.name.split('.').pop() || 'mp4'}`;
          await ffmpeg.writeFile(fileName, await window.fetchFile(t.file));
          args.push('-ss', t.start.toString(), '-t', (t.end - t.start).toString(), '-i', fileName);
          
          if (!t.muted) {
             if (t.type === 'video') vStreams.push({ index: i, offset: t.offset || 0, start: t.start, end: t.end });
             if (t.type === 'audio') aStreams.push({ index: i, offset: t.offset || 0 });
          }
        }

        let filterComplex = "";
        let finalVMap = null;
        let finalAMap = null;

        if (vStreams.length > 0) {
            filterComplex += `color=c=black:s=1280x720:d=${maxEnd} [base]; `;
            let lastV = "base";
            vStreams.forEach((v, idx) => {
                let vf = state.selectedVideoFilter.vf ? `,${state.selectedVideoFilter.vf}` : "";
                filterComplex += `[${v.index}:v]scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2,setsar=1${vf} [v${idx}]; `;
                let nextV = `bg${idx}`;
                let duration = v.end - v.start;
                filterComplex += `[${lastV}][v${idx}]overlay=enable='between(t,${v.offset},${v.offset + duration})' [${nextV}]; `;
                lastV = nextV;
            });
            finalVMap = lastV;
        }

        if (aStreams.length > 0) {
            aStreams.forEach((a, idx) => {
                let offsetMs = Math.round(a.offset * 1000);
                let af = state.selectedAudioEffect.af ? `,${state.selectedAudioEffect.af}` : "";
                filterComplex += `[${a.index}:a]adelay=${offsetMs}|${offsetMs}${af}[a${idx}]; `;
            });
            let aInputs = aStreams.map((_, idx) => `[a${idx}]`).join('');
            filterComplex += `${aInputs}amix=inputs=${aStreams.length}:duration=longest:dropout_transition=2 [outa]; `;
            finalAMap = "outa";
        }

        if (filterComplex) args.push('-filter_complex', filterComplex);

        if (state.outputFormat === 'mp4') {
            if (finalVMap) args.push('-map', `[${finalVMap}]`);
            if (finalAMap) args.push('-map', `[${finalAMap}]`);
            args.push('-c:v', 'libx264', '-preset', 'ultrafast', '-crf', '28');
            if (finalAMap) args.push('-c:a', 'aac', '-b:a', '128k');
            args.push('-y', 'output.mp4');
            
            await ffmpeg.exec(args);
            const data = await ffmpeg.readFile('output.mp4');
            const blob = new Blob([data.buffer], { type: 'video/mp4' });
            state.resultUrl = URL.createObjectURL(blob);
        } else {
            if (finalAMap) args.push('-map', `[${finalAMap}]`);
            args.push('-c:a', 'libmp3lame', '-b:a', '128k', '-y', 'output.mp3');
            
            await ffmpeg.exec(args);
            const data = await ffmpeg.readFile('output.mp3');
            const blob = new Blob([data.buffer], { type: 'audio/mp3' });
            state.resultUrl = URL.createObjectURL(blob);
        }
      } catch (error) {
        console.error("Processing failed:", error);
        alert("Processing failed. Please check file format and size.");
      } finally {
        state.isProcessing = false;
        updateHeader();
        updateExportOverlay();
      }
    };

    // --- Pointer & Drag Logic ---
    window.handlePlayheadDown = (e) => {
      e.stopPropagation();
      e.currentTarget.setPointerCapture(e.pointerId);
      scrubbing = { startX: e.clientX, initialTime: state.currentTime };
    };

    window.handleRulerPointerDown = (e) => {
      const rect = e.currentTarget.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const newTime = Math.max(0, clickX / 20);
      state.currentTime = newTime;
      scrubbing = { startX: e.clientX, initialTime: newTime };
      updatePlayhead();
    };

    window.handleTrackPointerDown = (e, trackId, type) => {
      e.stopPropagation();
      e.currentTarget.setPointerCapture(e.pointerId);
      const t = state.tracks.find(t => t.id === trackId);
      if (!t) return;
      state.activeTrackId = trackId;
      draggingTrack = { id: t.id, type, startX: e.clientX, initialOffset: t.offset || 0, initialStart: t.start, initialEnd: t.end };
      renderTracks();
      updateToolbar();
    };

    window.handleDragStart = (e) => { isDraggingPreviewHeight = true; };

    window.addEventListener('pointermove', (e) => {
      if (draggingTrack) {
        const dx = e.clientX - draggingTrack.startX;
        const ds = dx / 20;
        const tIndex = state.tracks.findIndex(t => t.id === draggingTrack.id);
        if (tIndex === -1) return;
        const t = state.tracks[tIndex];

        if (draggingTrack.type === 'left') {
          const newStart = Math.max(0, Math.min(draggingTrack.initialStart + ds, t.end - 0.5));
          t.start = newStart;
          t.offset = Math.max(0, draggingTrack.initialOffset + (newStart - draggingTrack.initialStart));
        } else if (draggingTrack.type === 'right') {
          t.end = Math.max(t.start + 0.5, Math.min(draggingTrack.initialEnd + ds, t.duration));
        } else {
          t.offset = Math.max(0, draggingTrack.initialOffset + ds);
        }
        renderTracks();
      }
      
      if (scrubbing) {
        const dx = e.clientX - scrubbing.startX;
        state.currentTime = Math.max(0, scrubbing.initialTime + dx / 20);
        updatePlayhead();
      }
    });

    window.addEventListener('pointerup', () => { draggingTrack = null; scrubbing = null; });

    window.addEventListener('mousemove', (e) => {
      if (isDraggingPreviewHeight) {
        state.previewHeight = Math.max(20, Math.min((e.clientY / window.innerHeight) * 100, 70));
        document.getElementById('previewArea').style.height = `${state.previewHeight}vh`;
      }
    });
    window.addEventListener('touchmove', (e) => {
      if (isDraggingPreviewHeight) {
        state.previewHeight = Math.max(20, Math.min((e.touches[0].clientY / window.innerHeight) * 100, 70));
        document.getElementById('previewArea').style.height = `${state.previewHeight}vh`;
      }
    }, {passive: false});

    window.addEventListener('mouseup', () => { isDraggingPreviewHeight = false; });
    window.addEventListener('touchend', () => { isDraggingPreviewHeight = false; });

    // --- Game Loop for Syncing Timeline and Video Playback ---
    function gameLoop() {
      if (state.isPlaying) {
        const now = performance.now();
        state.currentTime += (now - lastTime) / 1000;
        lastTime = now;
        
        const totalLength = getTotalLength();
        if (state.currentTime >= totalLength) {
          state.isPlaying = false;
          state.currentTime = 0;
          updateToolbar();
        }
        updatePlayhead();
      }
      requestAnimationFrame(gameLoop);
    }
  </script>
</body>
</html>
