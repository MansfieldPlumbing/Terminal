[Appearance]
ApplicationTheme=Dark
AlwaysShowTabs=true
TabWidthMode=Equal
PaneAnimations=true

[Profile.Default]
Name=pwsh
Commandline=powershell.exe
ColorScheme=Campbell
FontFace=Cascadia Mono
FontSize=14
FontWeight=Normal
CursorShape=Bar
CursorColor=#FFFFFF
CursorBlink=true
Padding=8, 8, 8, 8
ScrollbarVisibility=Visible
BackgroundOpacity=100
EnableAcrylic=false

[Profile.Pink]
Name=pwsh pink
Commandline=powershell.exe
ColorScheme=NeonPink
FontFace=Cascadia Mono
FontSize=14
FontWeight=Normal
CursorShape=Bar
CursorColor=#FF00FF
CursorBlink=true
Padding=8, 8, 8, 8
ScrollbarVisibility=Visible
BackgroundOpacity=100
EnableAcrylic=false

